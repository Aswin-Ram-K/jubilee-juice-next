services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: deps
    command: sh -c "pnpm exec prisma generate && pnpm dev"
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./next.config.ts:/app/next.config.ts
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./.env.local:/app/.env.local
      - /app/node_modules
      - /app/.next
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: 1
    networks:
      - backend
